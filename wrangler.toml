# Mail Worker — Cloudflare Email Worker
# 收发分离的可发送可回复域名邮箱
name = "mail-worker"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# 部署前修改为你的实际配置
[vars]
WORKER_DOMAIN = "example.com"
WORKER_ALIAS = "worker"
MY_ADDRESS = "you@example.com"
FROM_NAME = "My Name"

# Email Worker 通过 Email Routing 触发，workers_dev 用于满足 wrangler 部署检查
workers_dev = true

# 可观测性
[observability]
enabled = true
head_sampling_rate = 1
