# Mail Worker — Cloudflare Email Worker
# 收发分离的可发送可回复域名邮箱
name = "mail-worker"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# 环境变量（敏感信息用 wrangler secret 设置，非敏感在此定义）
[vars]
WORKER_ADDRESS = "user@example.com"
MY_ADDRESS = "you@example.com"

# Email Worker 通过 Email Routing 触发，workers_dev 用于满足 wrangler 部署检查
workers_dev = true

# 可观测性
[observability]
enabled = true
head_sampling_rate = 1
